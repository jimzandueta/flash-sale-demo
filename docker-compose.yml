x-app-environment: &app-environment
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_REGION: ${AWS_REGION:-us-east-1}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  DEFAULT_RESERVATION_TTL_SECONDS: ${DEFAULT_RESERVATION_TTL_SECONDS:-300}
  RESERVATIONS_TABLE: ${RESERVATIONS_TABLE:-flash-sale-reservations-local}
  RESERVATION_EVENTS_QUEUE_URL: ${RESERVATION_EVENTS_QUEUE_URL:-http://localstack:4566/000000000000/dev-reservation-events}
  PURCHASE_EVENTS_QUEUE_URL: ${PURCHASE_EVENTS_QUEUE_URL:-http://localstack:4566/000000000000/dev-purchase-events}
  EXPIRY_EVENTS_QUEUE_URL: ${EXPIRY_EVENTS_QUEUE_URL:-http://localstack:4566/000000000000/dev-expiry-events}
  DEFAULT_TTL_PARAMETER_NAME: ${DEFAULT_TTL_PARAMETER_NAME:-/flash-sale/config/default-reservation-ttl-seconds}

services:
  redis:
    image: redis:7-alpine
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    ports:
      - '${REDIS_HOST_PORT:-6379}:6379'

  dynamodb-local:
    image: amazon/dynamodb-local:2.5.2
    command: ['-jar', 'DynamoDBLocal.jar', '-sharedDb', '-inMemory']
    ports:
      - '${DYNAMODB_HOST_PORT:-8000}:8000'

  localstack:
    image: localstack/localstack:3.7
    environment:
      SERVICES: sqs,ssm
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
    ports:
      - '${LOCALSTACK_HOST_PORT:-4566}:4566'
    volumes:
      - ./infra/local/localstack/init:/etc/localstack/init/ready.d

  api:
    build:
      context: .
      dockerfile: services/docker/backend.Dockerfile
    command: npx tsx services/docker/run-local-api.ts
    working_dir: /app
    environment:
      <<: *app-environment
      HOST: 0.0.0.0
      PORT: 3000
    depends_on:
      - redis
      - localstack
      - dynamodb-local
    ports:
      - '${API_HOST_PORT:-3000}:3000'
    volumes:
      - .:/app
      - node_modules:/app/node_modules

  worker:
    build:
      context: .
      dockerfile: services/docker/worker.Dockerfile
    command: npx tsx services/docker/run-local-worker.ts
    working_dir: /app
    environment:
      <<: *app-environment
      WORKER_HEARTBEAT_INTERVAL_MS: 30000
    depends_on:
      - redis
      - localstack
      - dynamodb-local
    volumes:
      - .:/app
      - node_modules:/app/node_modules

  expiry-sweeper:
    build:
      context: .
      dockerfile: services/docker/worker.Dockerfile
    command: npx tsx services/docker/run-local-expiry-sweeper.ts
    working_dir: /app
    environment:
      <<: *app-environment
      EXPIRY_SWEEP_INTERVAL_MS: 60000
    depends_on:
      - redis
      - localstack
    volumes:
      - .:/app
      - node_modules:/app/node_modules

  frontend:
    build:
      context: .
      dockerfile: frontend/app/Dockerfile
    command: npx vite --config vite.config.ts --host 0.0.0.0 --port 5173
    working_dir: /app
    depends_on:
      - api
    environment:
      CHOKIDAR_USEPOLLING: 'true'
    ports:
      - '${FRONTEND_HOST_PORT:-5173}:5173'
    volumes:
      - .:/app
      - node_modules:/app/node_modules

volumes:
  node_modules: